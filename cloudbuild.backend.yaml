substitutions:
  _REGION: us-central1
  _REPOSITORY: platerank
  _SERVICE: platerank-api
  _MIGRATION_JOB: platerank-db-migrate
  _AR_HOST: us-central1-docker.pkg.dev
  _BUILD_CACHE_TAG: buildcache
  _DEPLOY_MIGRATION_JOB: "true"
  _RUN_SA: platerank-runner@${PROJECT_ID}.iam.gserviceaccount.com
  _IMAGE_TAG: REQUIRED_IMAGE_TAG
  _CLOUDSQL_INSTANCE: REQUIRED_CLOUDSQL_INSTANCE
  _CORS_ALLOWLIST: REQUIRED_CORS_ALLOWLIST
  _MENU_ADMIN_EMAILS: REQUIRED_MENU_ADMIN_EMAILS
  _GOOGLE_PLACES_API_KEY_SECRET: GOOGLE_PLACES_API_KEY
  _JWT_SECRET_NAME: JWT_SECRET
  _DATABASE_URL_SECRET: DATABASE_URL
  _DISH_PHOTO_BUCKET: REQUIRED_DISH_PHOTO_BUCKET
  _DISH_PHOTO_PUBLIC_BASE_URL: ""
  _RECIPE_API_KEY_SECRET: RECIPE_API_KEY
  _RECIPE_SEARCH_CX_SECRET: RECIPE_SEARCH_CX

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Validate backend substitutions
    entrypoint: bash
    args:
      - -ceu
      - |
        if [[ "${_IMAGE_TAG}" == "REQUIRED_IMAGE_TAG" ]]; then
          echo "Missing required substitution: _IMAGE_TAG"
          exit 1
        fi
        if [[ "${_CLOUDSQL_INSTANCE}" == "REQUIRED_CLOUDSQL_INSTANCE" ]]; then
          echo "Missing required substitution: _CLOUDSQL_INSTANCE"
          exit 1
        fi
        if [[ "${_CORS_ALLOWLIST}" == "REQUIRED_CORS_ALLOWLIST" ]]; then
          echo "Missing required substitution: _CORS_ALLOWLIST"
          exit 1
        fi
        if [[ "${_MENU_ADMIN_EMAILS}" == "REQUIRED_MENU_ADMIN_EMAILS" ]]; then
          echo "Missing required substitution: _MENU_ADMIN_EMAILS"
          exit 1
        fi
        if [[ "${_DISH_PHOTO_BUCKET}" == "REQUIRED_DISH_PHOTO_BUCKET" ]]; then
          echo "Missing required substitution: _DISH_PHOTO_BUCKET"
          exit 1
        fi

  - name: gcr.io/cloud-builders/docker
    id: Pull backend build cache
    entrypoint: bash
    args:
      - -ceu
      - |
        docker pull ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_BUILD_CACHE_TAG} || true

  - name: gcr.io/cloud-builders/docker
    id: Build backend image
    args:
      - build
      - -f
      - Dockerfile
      - --cache-from
      - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_BUILD_CACHE_TAG}
      - -t
      - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}
      - -t
      - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_BUILD_CACHE_TAG}
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push backend image
    args:
      - push
      - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}

  - name: gcr.io/cloud-builders/docker
    id: Push backend build cache
    args:
      - push
      - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_BUILD_CACHE_TAG}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy and run migrations
    entrypoint: bash
    args:
      - -ceu
      - |
        if [[ "${_DEPLOY_MIGRATION_JOB}" == "true" ]]; then
          gcloud run jobs deploy ${_MIGRATION_JOB} \
            --project=${PROJECT_ID} \
            --region=${_REGION} \
            --image=${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG} \
            --service-account=${_RUN_SA} \
            --task-timeout=900s \
            --max-retries=0 \
            --command=npm \
            --args=run,prisma:migrate:deploy,-w,backend \
            --set-env-vars=NODE_ENV=production \
            --add-cloudsql-instances=${_CLOUDSQL_INSTANCE} \
            --set-secrets=DATABASE_URL=${_DATABASE_URL_SECRET}:latest
        else
          echo "Skipping migration job deploy because _DEPLOY_MIGRATION_JOB=${_DEPLOY_MIGRATION_JOB}"
        fi

        gcloud run jobs execute ${_MIGRATION_JOB} \
          --project=${PROJECT_ID} \
          --region=${_REGION} \
          --wait

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy backend to Cloud Run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --project=${PROJECT_ID}
      - --region=${_REGION}
      - --platform=managed
      - --image=${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}
      - --service-account=${_RUN_SA}
      - --allow-unauthenticated
      - --port=8080
      - --max-instances=10
      - --set-env-vars=NODE_ENV=production
      - --set-env-vars=PORT=8080
      - --set-env-vars=CORS_ORIGIN_ALLOWLIST=${_CORS_ALLOWLIST}
      - --set-env-vars=MENU_ADMIN_EMAILS=${_MENU_ADMIN_EMAILS}
      - --set-env-vars=DISH_PHOTO_BUCKET_NAME=${_DISH_PHOTO_BUCKET}
      - --set-env-vars=DISH_PHOTO_PUBLIC_BASE_URL=${_DISH_PHOTO_PUBLIC_BASE_URL}
      - --set-env-vars=DISH_PHOTO_UPLOAD_MAX_BYTES=8388608
      - --set-env-vars=JWT_EXPIRES_IN=disabled
      - --set-env-vars=BACKGROUND_JOBS_ENABLED=false
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --set-secrets=JWT_SECRET=${_JWT_SECRET_NAME}:latest
      - --set-secrets=DATABASE_URL=${_DATABASE_URL_SECRET}:latest
      - --set-secrets=GOOGLE_PLACES_API_KEY=${_GOOGLE_PLACES_API_KEY_SECRET}:latest
      - --set-secrets=RECIPE_API_KEY=${_RECIPE_API_KEY_SECRET}:latest
      - --set-secrets=RECIPE_SEARCH_CX=${_RECIPE_SEARCH_CX_SECRET}:latest

images:
  - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}
