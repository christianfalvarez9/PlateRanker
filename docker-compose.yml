services:
  db:
    image: postgres:16
    container_name: platerank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platerank
    ports:
      - "5432:5432"
    volumes:
      - platerank_pgdata:/var/lib/postgresql/data

volumes:
  platerank_pgdata:
