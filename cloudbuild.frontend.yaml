substitutions:
  _REGION: us-central1
  _SERVICE: platerank-web
  _REPOSITORY: platerank
  _AR_HOST: us-central1-docker.pkg.dev
  _RUN_SA: platerank-runner@${PROJECT_ID}.iam.gserviceaccount.com
  _IMAGE_TAG: REQUIRED_IMAGE_TAG
  _NEXT_PUBLIC_API_BASE_URL: REQUIRED_NEXT_PUBLIC_API_BASE_URL
  _NEXT_PUBLIC_MENU_ADMIN_EMAILS: REQUIRED_NEXT_PUBLIC_MENU_ADMIN_EMAILS

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Validate frontend substitutions
    entrypoint: bash
    args:
      - -ceu
      - |
        if [[ "${_IMAGE_TAG}" == "REQUIRED_IMAGE_TAG" ]]; then
          echo "Missing required substitution: _IMAGE_TAG"
          exit 1
        fi
        if [[ "${_NEXT_PUBLIC_API_BASE_URL}" == "REQUIRED_NEXT_PUBLIC_API_BASE_URL" ]]; then
          echo "Missing required substitution: _NEXT_PUBLIC_API_BASE_URL"
          exit 1
        fi
        if [[ "${_NEXT_PUBLIC_MENU_ADMIN_EMAILS}" == "REQUIRED_NEXT_PUBLIC_MENU_ADMIN_EMAILS" ]]; then
          echo "Missing required substitution: _NEXT_PUBLIC_MENU_ADMIN_EMAILS"
          exit 1
        fi

  - name: gcr.io/cloud-builders/docker
    id: Build frontend image
    args:
      - build
      - -f
      - frontend/Dockerfile
      - -t
      - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=${_NEXT_PUBLIC_API_BASE_URL}
      - --build-arg
      - NEXT_PUBLIC_MENU_ADMIN_EMAILS=${_NEXT_PUBLIC_MENU_ADMIN_EMAILS}
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push frontend image
    args:
      - push
      - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy frontend to Cloud Run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --project=${PROJECT_ID}
      - --region=${_REGION}
      - --platform=managed
      - --image=${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}
      - --service-account=${_RUN_SA}
      - --allow-unauthenticated
      - --port=8080
      - --max-instances=10
      - --set-env-vars=NODE_ENV=production
      - --set-env-vars=PORT=8080

images:
  - ${_AR_HOST}/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}
